spring:
  application:
    name: WEBSITE_PREPME

  # ─── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/database_prepme}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  # ─── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 6000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour

  # ─── Mail ────────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:dinhxuantruong2003coi@gmail.com}
    password: ${MAIL_PASSWORD:daln tzcb rdwf pumh}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

  # ─── File Upload ─────────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# ─── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ─── JWT ─────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:tU1GgKoDDd2AB8jllEbk1N8AytRba7MvlIyOA7EOowb}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:2592000000}    # 30 days

  # ─── Cloudinary ────────────────────────────────────────────────────────────
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:dilyyimrn}
    api-key: ${CLOUDINARY_API_KEY:622376695845593}
    api-secret: ${CLOUDINARY_API_SECRET:jmkTaFT6ZXoxqhEZ_slTs2y2XQs}
    folder: ${CLOUDINARY_FOLDER:prepme}

  # ─── CORS ──────────────────────────────────────────────────────────────────
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  # ─── Google OAuth2 ──────────────────────────────────────────────────────────
  google:
    # Google OAuth2 Client ID (Web Application type) from Google Cloud Console
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}

  # ─── OpenAI ────────────────────────────────────────────────────────────
  openai:
    api-key: ${OPENAI_API_KEY:sk-6QNo9E1A4oL06XwLXgA5e-CYHVgKt5_p7M5CXeaGO28}
    model: ${OPENAI_MODEL:codex/gpt5.5}
    transcribe-model: ${OPENAI_TRANSCRIBE_MODEL:whisper-1}
    base-url: ${OPENAI_BASE_URL:https://api.shineshop.dev/v1}
    max-tokens: ${OPENAI_MAX_TOKENS:20}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.fpt.website_prepme: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ─── SpringDoc / Swagger ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  show-actuator: false
